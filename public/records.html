<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Records (Database 2)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/auth.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <nav class="bg-slate-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <span id="navHeading" class="font-semibold"></span>
      <div class="flex items-center gap-4 text-sm">
        <a href="/" class="hover:underline text-slate-300">Payment Form</a>
        <a href="/rooms.html" class="nav-admin hover:underline text-slate-300">Rooms (DB1)</a>
        <a href="/records.html" class="nav-admin hover:underline font-medium">Records (DB2)</a>
        <a href="/users.html" class="nav-admin hover:underline text-slate-300">Users (DB3)</a>
        <button id="logoutBtn" class="bg-slate-700 hover:bg-slate-600 rounded-lg px-3 py-1">Log out</button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Submitted Records · Database 2</h1>

    <!-- Filter bar -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-wrap items-end gap-4">
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">Room</label>
        <select id="f_room" class="border rounded-lg px-3 py-2 bg-white text-sm">
          <option value="">All rooms</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">From month</label>
        <input id="f_from" type="month" class="border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">To month</label>
        <input id="f_to" type="month" class="border rounded-lg px-3 py-2 text-sm" />
      </div>
      <button id="applyBtn" class="bg-slate-900 hover:bg-slate-700 text-white text-sm font-semibold px-5 py-2 rounded-lg">Apply</button>
      <button id="clearBtn" class="text-sm text-slate-500 hover:underline">Clear</button>
      <span id="count" class="text-sm text-slate-400 ml-auto"></span>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
      <table class="w-full text-sm whitespace-nowrap">
        <thead class="bg-slate-50 text-slate-500 text-left">
          <tr>
            <th class="px-3 py-2">Date</th>
            <th class="px-3 py-2">Room</th>
            <th class="px-3 py-2">Month</th>
            <th class="px-3 py-2">Rent</th>
            <th class="px-3 py-2">Elec (prev→cur)</th>
            <th class="px-3 py-2">Elec bill</th>
            <th class="px-3 py-2">Water (prev→cur)</th>
            <th class="px-3 py-2">Water bill</th>
            <th class="px-3 py-2">Common</th>
            <th class="px-3 py-2">Add.</th>
            <th class="px-3 py-2 font-semibold">Total</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p class="text-xs text-slate-400 mt-2">Tip: click a <span class="text-blue-600">new meter reading</span> to view its photo, or the <span class="text-blue-600">Add.</span> amount for the bill breakdown.</p>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-lg max-w-lg w-full max-h-[85vh] overflow-auto">
      <div class="flex items-center justify-between px-5 py-3 border-b">
        <h3 id="modalTitle" class="font-semibold"></h3>
        <button id="modalClose" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
      </div>
      <div id="modalBody" class="p-5"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => Number(n || 0).toFixed(2);
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const recById = {}; // id -> record, for the breakdown popup

    // ---- modal ----
    function openModal(title, html) {
      $('modalTitle').textContent = title;
      $('modalBody').innerHTML = html;
      $('modal').classList.remove('hidden');
      $('modal').classList.add('flex');
    }
    function closeModal() {
      $('modal').classList.add('hidden');
      $('modal').classList.remove('flex');
      $('modalBody').innerHTML = '';
    }
    $('modalClose').addEventListener('click', closeModal);
    $('modal').addEventListener('click', (e) => { if (e.target === $('modal')) closeModal(); });

    // Fetch and display a meter/slip photo for one record.
    async function showImage(id, type, title) {
      openModal(title, '<p class="text-slate-400 text-sm">Loading…</p>');
      try {
        const res = await fetch(`/api/records?id=${id}&image=${type}`);
        const data = await res.json();
        if (data.image) {
          $('modalBody').innerHTML =
            `<img src="${data.image}" alt="${esc(title)}" class="max-w-full rounded-lg" />`;
        } else {
          $('modalBody').innerHTML = '<p class="text-slate-400 text-sm">No photo uploaded for this record.</p>';
        }
      } catch (err) {
        $('modalBody').innerHTML = `<p class="text-red-600 text-sm">${esc(err.message)}</p>`;
      }
    }

    // Show the full additional-bills breakdown for one record.
    function showOther(id) {
      const r = recById[id];
      if (!r) return;
      const rows = [
        ['Refrigerator', r.refrigerator_bill],
        ['Microwave oven', r.microwave_bill],
        ['Carpark', r.carpark_bill],
      ].filter(([, v]) => Number(v) > 0);
      const others = Array.isArray(r.other_bills) ? r.other_bills : [];
      for (const o of others) rows.push([o.label || 'Other', o.amount]);

      const total = rows.reduce((s, [, v]) => s + (Number(v) || 0), 0);
      const body = rows.length
        ? rows.map(([label, v]) =>
            `<div class="flex justify-between py-1 border-b last:border-0">
               <span>${esc(label)}</span><span class="font-medium">${fmt(v)}</span></div>`).join('')
          + `<div class="flex justify-between pt-2 mt-1 font-semibold">
               <span>Total additional</span><span>${fmt(total)}</span></div>`
        : '<p class="text-slate-400 text-sm">No additional bills on this record.</p>';
      openModal(`Additional bills · Room ${esc(r.room_number)} · ${esc(r.bill_month || '—')}`, body);
    }

    // Populate the room filter dropdown from the configured rooms.
    async function loadRoomOptions() {
      try {
        const res = await fetch('/api/rooms');
        const rooms = await res.json();
        for (const r of rooms) {
          const opt = document.createElement('option');
          opt.value = r.room_number;
          opt.textContent = `Room ${r.room_number}`;
          $('f_room').appendChild(opt);
        }
      } catch (_) { /* ignore */ }
    }

    async function load() {
      const params = new URLSearchParams();
      if ($('f_room').value) params.set('filterRoom', $('f_room').value);
      if ($('f_from').value) params.set('from', $('f_from').value);
      if ($('f_to').value) params.set('to', $('f_to').value);

      const res = await fetch('/api/records?' + params.toString());
      const rows = await res.json();
      const body = document.getElementById('rows');
      body.innerHTML = '';
      $('count').textContent = `${rows.length} record${rows.length === 1 ? '' : 's'}`;
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="11" class="px-4 py-6 text-center text-slate-400">No records match.</td></tr>';
        return;
      }
      for (const r of rows) {
        recById[r.id] = r;
        const others = Array.isArray(r.other_bills) ? r.other_bills : [];
        const add = Number(r.refrigerator_bill) + Number(r.microwave_bill) +
                    Number(r.carpark_bill) +
                    others.reduce((s, o) => s + (Number(o.amount) || 0), 0);
        const link = 'text-blue-600 underline hover:text-blue-800 cursor-pointer';
        const tr = document.createElement('tr');
        tr.className = 'border-t';
        tr.innerHTML = `
          <td class="px-3 py-2">${new Date(r.created_at).toLocaleDateString()}</td>
          <td class="px-3 py-2 font-medium">${r.room_number}</td>
          <td class="px-3 py-2">${r.bill_month || '—'}</td>
          <td class="px-3 py-2">${fmt(r.rent)}</td>
          <td class="px-3 py-2 text-slate-500">${fmt(r.electric_prev)} →
            <button class="${link}" onclick="showImage(${r.id},'electric','Electric meter photo')">${fmt(r.electric_curr)}</button></td>
          <td class="px-3 py-2">${fmt(r.electric_bill)}</td>
          <td class="px-3 py-2 text-slate-500">${fmt(r.water_prev)} →
            <button class="${link}" onclick="showImage(${r.id},'water','Water meter photo')">${fmt(r.water_curr)}</button></td>
          <td class="px-3 py-2">${fmt(r.water_bill)}</td>
          <td class="px-3 py-2">${fmt(r.common_fee)}</td>
          <td class="px-3 py-2"><button class="${link}" onclick="showOther(${r.id})">${fmt(add)}</button></td>
          <td class="px-3 py-2 font-semibold"><button class="${link}" onclick="showImage(${r.id},'slip','Payment slip')">${fmt(r.total)}</button></td>`;
        body.appendChild(tr);
      }
    }

    $('applyBtn').addEventListener('click', load);
    $('clearBtn').addEventListener('click', () => {
      $('f_room').value = '';
      $('f_from').value = '';
      $('f_to').value = '';
      load();
    });

    loadRoomOptions();
    load();
  </script>
</body>
</html>

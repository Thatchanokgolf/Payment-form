<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Dorm Rent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/auth.js"></script>
  <script src="/i18n.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex justify-end mb-2">
      <button id="langToggle" class="text-sm bg-white border rounded-lg px-3 py-1 shadow-sm hover:bg-slate-50">EN</button>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-7">
      <h1 class="text-xl font-bold mb-1">🏠 Dorm Rent</h1>
      <p class="text-sm text-slate-500 mb-6" data-i18n="login.subtitle">Sign in to continue</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1" data-i18n="login.id">ID</label>
          <input id="uid" required autocomplete="username"
                 class="w-full border rounded-lg px-3 py-2" placeholder="Admin / 201 / 2201" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1" data-i18n="login.password">Password</label>
          <input id="pw" type="password" required autocomplete="current-password"
                 class="w-full border rounded-lg px-3 py-2" placeholder="••••" />
        </div>
        <button type="submit"
                class="w-full bg-slate-900 hover:bg-slate-700 text-white font-semibold py-2.5 rounded-xl"
                data-i18n="login.signin">
          Sign in
        </button>
        <p id="error" class="text-sm text-red-600 hidden" data-i18n="login.error">Invalid ID or password.</p>
      </form>
      <p class="text-sm text-center mt-4">
        <a href="/register.html" class="text-blue-600 hover:underline" data-i18n="reg.link">Register</a>
      </p>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const form = $('loginForm');
    const btn = form.querySelector('button[type="submit"]');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      $('error').classList.add('hidden');
      btn.disabled = true; btn.classList.add('opacity-60');
      const ok = await window.DormAuth.login($('uid').value.trim(), $('pw').value);
      if (ok) {
        location.replace('/menu.html');
      } else {
        $('error').classList.remove('hidden');
        $('pw').value = '';
        btn.disabled = false; btn.classList.remove('opacity-60');
      }
    });
  </script>
</body>
</html>

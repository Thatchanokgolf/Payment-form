<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dormitory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <nav class="bg-slate-900 text-white">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="font-semibold">🏠 <span data-i18n="fp.title">Dormitory</span></span>
      <div class="flex items-center gap-4 text-sm">
        <a href="/login.html" class="hover:underline text-slate-300" data-i18n="fp.login">Staff / Resident login</a>
        <button id="langToggle" class="bg-slate-700 hover:bg-slate-600 rounded-lg px-3 py-1">EN</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-1" data-i18n="fp.title">Dormitory</h1>
    <p class="text-slate-500 mb-8 text-sm" data-i18n="fp.subtitle">Welcome — please choose an option.</p>

    <div class="grid sm:grid-cols-2 gap-5">
      <!-- Dormitory details -->
      <a href="/detail.html"
         class="group bg-white rounded-2xl shadow-sm p-6 hover:shadow-md hover:-translate-y-0.5 transition flex items-start gap-4">
        <div class="text-3xl">🏢</div>
        <div>
          <h2 class="font-semibold text-lg group-hover:text-emerald-700" data-i18n="fp.detail_title">Dormitory details</h2>
          <p class="text-sm text-slate-500 mt-1" data-i18n="fp.detail_desc">Information about Charal Prasit Lakeview and Baan Mae Miw.</p>
        </div>
      </a>

      <!-- Reservation -->
      <a href="/reserve.html"
         class="group bg-white rounded-2xl shadow-sm p-6 hover:shadow-md hover:-translate-y-0.5 transition flex items-start gap-4">
        <div class="text-3xl">📝</div>
        <div>
          <h2 class="font-semibold text-lg group-hover:text-emerald-700" data-i18n="fp.reserve_title">Reserve a room</h2>
          <p class="text-sm text-slate-500 mt-1" data-i18n="fp.reserve_desc">Submit a dormitory reservation.</p>
        </div>
      </a>

      <!-- Vacant rooms (external) -->
      <a href="https://jplakeview.netlify.app" target="_blank" rel="noopener"
         class="group bg-white rounded-2xl shadow-sm p-6 hover:shadow-md hover:-translate-y-0.5 transition flex items-start gap-4 sm:col-span-2">
        <div class="text-3xl">🔑</div>
        <div>
          <h2 class="font-semibold text-lg group-hover:text-emerald-700"><span data-i18n="fp.vacant_title">Vacant rooms</span> <span class="text-xs text-slate-400">↗</span></h2>
          <p class="text-sm text-slate-500 mt-1" data-i18n="fp.vacant_desc">Check room availability.</p>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
